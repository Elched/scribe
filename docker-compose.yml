# ── SCRIBE — docker-compose.yml (version open-source) ─────────────────────
# Usage :
#   docker compose up -d          → premier démarrage
#   docker compose down           → arrêt
#   docker compose logs -f        → logs en temps réel
#   docker compose pull && docker compose up -d  → mise à jour

services:
  traefik:
    image: traefik:v3.0
    container_name: scribe-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Dashboard (only for development)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_data:/data
    networks:
      - scribe_default
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.tls.certresolver=myresolver"

  scribe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scribe
    restart: on-failure:3  # Évite la boucle infinie si config manquante
    expose:
      - "8000"
    volumes:
      # Données persistantes : base SQLite, uploads, config générée
      - scribe_data:/data
      # ── CONFIG PERSONNALISÉE ──────────────────────────────────────
      # Décommentez et adaptez pour utiliser votre propre config.xml :
      # - ./config.xml:/data/config.xml:ro
      #
      # Sans ce volume, SCRIBE démarre en mode DEMO (config_demo1.xml).
      # login: dircrise / password: voir config_demo1.xml
      # ──────────────────────────────────────────────────────────────
    environment:
      # Fournisseur IA (surpasse config.xml si renseigné)
      - SCRIBE_IA_PROVIDER=${SCRIBE_IA_PROVIDER:-albert}
      - SCRIBE_IA_KEY=${SCRIBE_IA_KEY:-}
      - SCRIBE_IA_MODEL=${SCRIBE_IA_MODEL:-}
      - SCRIBE_IA_URL=${SCRIBE_IA_URL:-}
      # Niveau de log
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - scribe_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.scribe.rule=Host(`localhost`)"
      - "traefik.http.routers.scribe.entrypoints=websecure"
      - "traefik.http.routers.scribe.service=scribe"
      - "traefik.http.routers.scribe.tls.certresolver=myresolver"
      - "traefik.http.services.scribe.loadbalancer.server.port=8000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

volumes:
  scribe_data:
    driver: local
  traefik_data:
    driver: local

networks:
  scribe_default:
    driver: bridge
