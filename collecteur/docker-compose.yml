# ── SCRIBE Collecteur territorial ──────────────────────────────────────────
# Déployer sur un serveur accessible par tous les établissements adhérents
# (ou sur le réseau GHT, ou chez le CERT Santé)

services:
  collecteur:
    build: .
    container_name: scribe-collecteur
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - collecteur_data:/data
    environment:
      # Token admin — CHANGER avant déploiement ou laisser auto-généré
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  collecteur_data:
